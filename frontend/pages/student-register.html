<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration - Attachee Management System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <style>
    .register-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a73e8 0%, #1557b0 100%);
      padding: 20px;
    }
    .register-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 600px;
      padding: 40px;
    }
    .register-logo { text-align: center; margin-bottom: 30px; }
    .register-logo i { font-size: 48px; color: #1a73e8; margin-bottom: 15px; }
    .register-logo h1 { font-size: 24px; color: #202124; margin-bottom: 5px; }
    .register-logo p { color: #5f6368; font-size: 14px; }
    .form-section { margin-bottom: 24px; }
    .form-section h4 { 
      font-size: 15px; 
      font-weight: 600; 
      color: #1a73e8; 
      margin-bottom: 16px; 
      padding-bottom: 8px; 
      border-bottom: 2px solid #e8f0fe;
    }
  </style>
</head>
<body>
  <div class="register-page">
    <div class="register-card">
      <div class="register-logo">
        <i class="fas fa-user-graduate"></i>
        <h1>Student Registration</h1>
        <p>Department of Water, Energy, Environment & Natural Resources</p>
        <small>Kisii County Government</small>
      </div>

      <div id="formAlert" style="display: none;"></div>

      <form id="studentRegisterForm">
        <div class="form-section">
          <h4><i class="fas fa-user"></i> Account Information</h4>
          <div class="form-row">
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" id="fullName" class="form-control" placeholder="e.g. John Mwangi" required>
            </div>
            <div class="form-group">
              <label>Email Address *</label>
              <input type="email" id="email" class="form-control" placeholder="e.g. john@example.com" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Password *</label>
              <input type="password" id="password" class="form-control" placeholder="Create a password (min 6 chars)" required minlength="6">
            </div>
            <div class="form-group">
              <label>Confirm Password *</label>
              <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h4><i class="fas fa-graduation-cap"></i> Academic Information</h4>
          <div class="form-row">
            <div class="form-group">
              <label>Institution Name *</label>
              <input type="text" id="institution" class="form-control" placeholder="e.g. Kisii University" required>
            </div>
            <div class="form-group">
              <label>Course of Study *</label>
              <input type="text" id="course" class="form-control" placeholder="e.g. BSc. Water Engineering" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Student ID Number *</label>
              <input type="text" id="studentId" class="form-control" placeholder="e.g. KI2021/001" required>
            </div>
            <div class="form-group">
              <label>National ID Number *</label>
              <input type="text" id="nationalId" class="form-control" placeholder="e.g. 12345678" required>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h4><i class="fas fa-phone"></i> Contact Information</h4>
          <div class="form-row">
            <div class="form-group">
              <label>Phone Number *</label>
              <input type="tel" id="phone" class="form-control" placeholder="e.g. 0712345678" required>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h4><i class="fas fa-calendar"></i> Attachment Period</h4>
          <div class="form-row">
            <div class="form-group">
              <label>Start Date *</label>
              <input type="date" id="startDate" class="form-control" required>
            </div>
            <div class="form-group">
              <label>End Date *</label>
              <input type="date" id="endDate" class="form-control" required>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h4><i class="fas fa-upload"></i> Required Documents</h4>
          <p style="color: var(--gray-600); font-size: 13px; margin-bottom: 12px;">Upload scanned copies (PDF, JPG, PNG - max 5MB each)</p>
          <div class="form-row">
            <div class="form-group">
              <label>School Request Letter *</label>
              <input type="file" id="schoolLetter" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
            </div>
            <div class="form-group">
              <label>Student ID Card *</label>
              <input type="file" id="studentIdUpload" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>National ID *</label>
              <input type="file" id="nationalIdUpload" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
            </div>
            <div class="form-group">
              <label>Insurance Cover *</label>
              <input type="file" id="insurance" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Passport Photo *</label>
              <input type="file" id="passportPhoto" class="form-control" accept=".jpg,.jpeg,.png" required>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block mt-2">
          <i class="fas fa-user-plus"></i> Register & Sign In
        </button>
      </form>

      <div class="text-center mt-2">
        <p style="color: var(--gray-500); font-size: 14px;">
          Already have an account? <a href="login.html" style="color: #1a73e8; font-weight: 500;">Sign In</a>
        </p>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script>
    document.getElementById('studentRegisterForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('formAlert');
      const submitBtn = e.target.querySelector('button[type="submit"]');

      // Validate passwords match
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      if (password !== confirm) {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = 'Passwords do not match!';
        alertEl.style.display = 'block';
        return;
      }

      const data = {
        name: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        password: password,
        phone: document.getElementById('phone').value,
        nationalId: document.getElementById('nationalId').value,
        institution: document.getElementById('institution').value,
        course: document.getElementById('course').value,
        studentId: document.getElementById('studentId').value,
        attachmentStartDate: document.getElementById('startDate').value,
        attachmentEndDate: document.getElementById('endDate').value,
      };

      try {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';

        const response = await API.studentRegister(data);
        
        // Auto-login after registration
        localStorage.setItem('token', response.data.token);
        localStorage.setItem('user', JSON.stringify(response.data));

        alertEl.className = 'alert alert-success';
        alertEl.textContent = 'Registration successful! Redirecting to dashboard...';
        alertEl.style.display = 'block';

        setTimeout(() => {
          window.location.href = 'student-dashboard.html';
        }, 1500);
      } catch (error) {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = error.message;
        alertEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Register & Sign In';
      }
    });
  </script>
</body>
</html>
