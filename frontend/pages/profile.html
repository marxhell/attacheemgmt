<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Attachee Management System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><i class="fas fa-users-gear"></i><h2>Attachee MS</h2><small>Kisii County - Water & Energy</small></div>
      <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <div class="nav-section">Management</div>
        <a href="attachees.html"><i class="fas fa-users"></i> Attachees</a>
        <a href="register-attachee.html"><i class="fas fa-user-plus"></i> Register Attachee</a>
        <a href="supervisors.html"><i class="fas fa-chalkboard-user"></i> Supervisors</a>
        <a href="departments.html"><i class="fas fa-building"></i> Departments</a>
        <div class="nav-section">Tracking</div>
        <a href="evaluations.html"><i class="fas fa-star"></i> Evaluations</a>
        <div class="nav-section">Reports</div>
        <a href="reports.html"><i class="fas fa-file-alt"></i> Reports</a>
        <div class="nav-section">Account</div>
        <a href="profile.html" class="active"><i class="fas fa-user-circle"></i> Profile</a>
        <a href="#" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>
    <main class="main-content">
      <header class="header">
        <div class="header-left"><button class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button><h1>My Profile</h1></div>
        <div class="header-right"><div class="user-info" onclick="window.location.href='profile.html'"><div class="user-avatar" id="userAvatar">A</div><div><div class="user-name" id="userName">Admin</div><div class="user-role" id="userRole">Administrator</div></div></div></div>
      </header>
      <div class="page-content">
        <div class="card">
          <div class="card-header"><h3>Account Information</h3></div>
          <div class="card-body">
            <form id="profileForm">
              <div class="form-row">
                <div class="form-group"><label>Name</label><input type="text" id="profName" class="form-control"></div>
                <div class="form-group"><label>Email</label><input type="email" id="profEmail" class="form-control" disabled></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>Phone</label><input type="tel" id="profPhone" class="form-control"></div>
                <div class="form-group"><label>Role</label><input type="text" id="profRole" class="form-control" disabled></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>Department</label><input type="text" id="profDept" class="form-control"></div>
                <div class="form-group"><label>Designation</label><input type="text" id="profDesignation" class="form-control"></div>
              </div>
              <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Profile</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!Auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
      Auth.updateHeaderUser();
      try {
        const res = await API.getProfile();
        const u = res.data;
        document.getElementById('profName').value = u.name || '';
        document.getElementById('profEmail').value = u.email || '';
        document.getElementById('profPhone').value = u.phone || '';
        document.getElementById('profRole').value = u.role?.charAt(0).toUpperCase() + u.role?.slice(1) || '';
        document.getElementById('profDept').value = u.department || '';
        document.getElementById('profDesignation').value = u.designation || '';
      } catch(e) { console.error(e); }
    });
    document.getElementById('profileForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await API.updateProfile({
          name: document.getElementById('profName').value,
          phone: document.getElementById('profPhone').value,
          department: document.getElementById('profDept').value,
          designation: document.getElementById('profDesignation').value,
        });
        alert('Profile updated!');
      } catch(error) { alert(error.message); }
    });
  </script>
</body>
</html>
