<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Attachee Management System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><i class="fas fa-users-gear"></i><h2>Attachee MS</h2><small>Kisii County - Water & Energy</small></div>
      <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <div class="nav-section">Management</div>
        <a href="attachees.html"><i class="fas fa-users"></i> Attachees</a>
        <a href="register-attachee.html"><i class="fas fa-user-plus"></i> Register Attachee</a>
        <a href="supervisors.html"><i class="fas fa-chalkboard-user"></i> Supervisors</a>
        <a href="departments.html"><i class="fas fa-building"></i> Departments</a>
        <div class="nav-section">Tracking</div>
        <a href="evaluations.html"><i class="fas fa-star"></i> Evaluations</a>
        <div class="nav-section">Reports</div>
        <a href="reports.html"><i class="fas fa-file-alt"></i> Reports</a>
        <div class="nav-section">Account</div>
        <a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a>
        <a href="settings.html" class="active"><i class="fas fa-cog"></i> Settings</a>
        <a href="#" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>
    <main class="main-content">
      <header class="header">
        <div class="header-left"><button class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button><h1>Settings</h1></div>
        <div class="header-right"><div class="user-info"><div class="user-avatar" id="userAvatar">A</div><div><div class="user-name" id="userName">Admin</div><div class="user-role" id="userRole">Administrator</div></div></div></div>
      </header>
      <div class="page-content">
        <div class="card">
          <div class="card-header"><h3>Change Password</h3></div>
          <div class="card-body">
            <form id="passwordForm">
              <div class="form-group"><label>Current Password</label><input type="password" id="currentPassword" class="form-control" required></div>
              <div class="form-group"><label>New Password</label><input type="password" id="newPassword" class="form-control" required minlength="6"></div>
              <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPassword" class="form-control" required></div>
              <button type="submit" class="btn btn-primary"><i class="fas fa-key"></i> Change Password</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    document.getElementById('passwordForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const np = document.getElementById('newPassword').value;
      const cp = document.getElementById('confirmPassword').value;
      if (np !== cp) { alert('Passwords do not match!'); return; }
      try {
        await API.updatePassword({
          currentPassword: document.getElementById('currentPassword').value,
          newPassword: np,
        });
        alert('Password changed successfully!');
        e.target.reset();
      } catch(error) { alert(error.message); }
    });
  </script>
</body>
</html>
