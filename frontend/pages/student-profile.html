<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Attachee Management System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><i class="fas fa-user-graduate"></i><h2>Student Portal</h2><small>Kisii County - Water & Energy</small></div>
      <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a href="student-dashboard.html"><i class="fas fa-chart-pie"></i> My Dashboard</a>
        <div class="nav-section">My Activities</div>
        <a href="student-evaluations.html"><i class="fas fa-star"></i> My Evaluations</a>
        <div class="nav-section">Account</div>
        <a href="student-profile.html" class="active"><i class="fas fa-user-circle"></i> My Profile</a>
        <a href="#" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>
    <main class="main-content">
      <header class="header">
        <div class="header-left"><button class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button><h1>My Profile</h1></div>
        <div class="header-right"><div class="user-info"><div class="user-avatar" id="userAvatar">S</div><div><div class="user-name" id="userName">Student</div><div class="user-role" id="userRole">Attachee</div></div></div></div>
      </header>
      <div class="page-content">
        <div class="card">
          <div class="card-header"><h3>Account Information</h3></div>
          <div class="card-body">
            <form id="profileForm">
              <div class="form-row">
                <div class="form-group"><label>Name</label><input type="text" id="profName" class="form-control"></div>
                <div class="form-group"><label>Email</label><input type="email" id="profEmail" class="form-control" disabled></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>Phone</label><input type="tel" id="profPhone" class="form-control"></div>
                <div class="form-group"><label>Role</label><input type="text" id="profRole" class="form-control" disabled></div>
              </div>
              <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Profile</button>
            </form>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h3>Change Password</h3></div>
          <div class="card-body">
            <form id="passwordForm">
              <div class="form-group"><label>Current Password</label><input type="password" id="currentPassword" class="form-control" required></div>
              <div class="form-group"><label>New Password</label><input type="password" id="newPassword" class="form-control" required minlength="6"></div>
              <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPassword" class="form-control" required></div>
              <button type="submit" class="btn btn-primary"><i class="fas fa-key"></i> Change Password</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!Auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
      Auth.updateHeaderUser();
      try {
        const res = await API.getProfile();
        const u = res.data;
        document.getElementById('profName').value = u.name || '';
        document.getElementById('profEmail').value = u.email || '';
        document.getElementById('profPhone').value = u.phone || '';
        document.getElementById('profRole').value = 'Attachee';
      } catch(e) { console.error(e); }
    });
    document.getElementById('profileForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await API.updateProfile({
          name: document.getElementById('profName').value,
          phone: document.getElementById('profPhone').value,
        });
        alert('Profile updated!');
      } catch(error) { alert(error.message); }
    });
    document.getElementById('passwordForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const np = document.getElementById('newPassword').value;
      const cp = document.getElementById('confirmPassword').value;
      if (np !== cp) { alert('Passwords do not match!'); return; }
      try {
        await API.updatePassword({
          currentPassword: document.getElementById('currentPassword').value,
          newPassword: np,
        });
        alert('Password changed successfully!');
        e.target.reset();
      } catch(error) { alert(error.message); }
    });
  </script>
</body>
</html>
